<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YSL Has Moved</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#0d0d17;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:700px;
    height:700px;
    background:radial-gradient(circle,#7c3aed55 0%,transparent 70%);
    filter:blur(60px);
}

.card{
    position:relative;
    z-index:1;
    width:min(90%,650px);
    background:rgba(20,20,35,.92);
    border:1px solid rgba(255,255,255,.08);
    border-radius:22px;
    padding:55px;
    text-align:center;
    backdrop-filter:blur(18px);
    box-shadow:0 20px 60px rgba(0,0,0,.45);
}

.logo{
    width:90px;
    height:90px;
    margin:0 auto 30px;
    border-radius:20px;
    background:#7c3aed;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    font-weight:800;
}

h1{
    font-size:42px;
    margin-bottom:18px;
}

p{
    color:#b8b8c7;
    font-size:18px;
    line-height:1.7;
    margin-bottom:35px;
}

a{
    display:inline-block;
    text-decoration:none;
    background:#7c3aed;
    color:#fff;
    padding:16px 34px;
    border-radius:14px;
    font-size:17px;
    font-weight:700;
    transition:.25s;
}

a:hover{
    transform:translateY(-3px);
    background:#8b5cf6;
}

.small{
    margin-top:28px;
    font-size:14px;
    color:#777;
}
</style>

</head>
<body>

<div class="card">

    <div class="logo">YSL</div>

    <h1>We've Moved!</h1>

    <p>
        The Youth Soccer League website has moved to a new home.
        Please update your bookmarks and continue using the new website below.
    </p>

    <a href="https://ysl.wispbyte.org">
        Visit the New Website
    </a>

    <div class="small">
        This page will be removed soon.
    </div>

</div>

</body>
</html>
