<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0711">
<title>Player Profile — YSL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0711;--paper:#f2ede6;--ink:#121014;--text:#f7f1fb;--muted:#a69aaa;--purple:#8756e8;--purple-hot:#a47cff;--line:rgba(255,255,255,.10);--line2:rgba(255,255,255,.20);--green:#b9ff62;--red:#ff7189;--amber:#ffca68;--max:1440px;--ease:cubic-bezier(.22,.84,.26,1)}
*{box-sizing:border-box}html{background:var(--bg);color-scheme:dark}body{margin:0;min-height:100vh;color:var(--text);background:radial-gradient(circle at 12% 4%,rgba(135,86,232,.14),transparent 25rem),linear-gradient(180deg,#0b0711,#100916 62%,#09060e);font-family:"DM Sans",sans-serif}a{color:inherit;text-decoration:none}.shell{width:min(var(--max),calc(100% - 42px));margin:auto}
header{position:fixed;inset:0 0 auto;z-index:50;border-bottom:1px solid transparent;transition:.3s}header.scrolled{background:rgba(11,7,17,.85);border-color:var(--line);backdrop-filter:blur(18px)}.nav{min-height:78px;display:grid;grid-template-columns:auto 1fr auto;align-items:center}.brand{font-family:"Archivo Black";font-size:1.55rem;letter-spacing:-.08em}.links{justify-self:center;display:flex;gap:25px}.links a{font-size:.67rem;font-weight:700;text-transform:uppercase;color:#c8becb}.actions{display:flex;gap:10px}.button{min-height:42px;display:inline-flex;align-items:center;padding:0 15px;border:1px solid var(--line2);border-radius:999px;font-size:.65rem;font-weight:700;text-transform:uppercase}
main{padding:145px 0 90px}.back{display:inline-flex;gap:10px;align-items:center;color:#a99eac;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em}.hero{display:grid;grid-template-columns:330px 1fr;gap:55px;align-items:end;margin-top:35px;padding-bottom:45px;border-bottom:1px solid var(--line)}.portrait{aspect-ratio:1;display:grid;place-items:center;overflow:hidden;border:1px solid var(--line);background:#17111d;font-family:"Archivo Black";font-size:4rem}.portrait img{width:100%;height:100%;object-fit:cover}.eyebrow{color:#cdbdff;font-size:.59rem;font-weight:700;text-transform:uppercase;letter-spacing:.14em}.name{margin:12px 0 18px;font-family:"Archivo Black";font-size:clamp(3.3rem,7vw,7.3rem);line-height:.82;letter-spacing:-.075em;text-transform:uppercase}.identity{display:flex;flex-wrap:wrap;align-items:center;gap:18px}.club{display:flex;align-items:center;gap:11px}.club-logo{width:46px;height:46px;display:grid;place-items:center;overflow:hidden;border:1px solid var(--line);background:#17111d;font-family:"Archivo Black";font-size:.55rem}.club-logo img{width:100%;height:100%;object-fit:contain;padding:5px}.club-copy strong,.club-copy span{display:block}.club-copy strong{font-size:.75rem}.club-copy span{margin-top:4px;color:#817686;font-size:.55rem}.pill{padding:9px 11px;border:1px solid var(--line);font-size:.57rem;font-weight:700;text-transform:uppercase}.rating{margin-left:auto;font-family:"Archivo Black";font-size:5rem;line-height:.8;letter-spacing:-.08em}.rating small{display:block;margin-top:10px;color:#7d7280;font-family:"DM Sans";font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;text-align:right}
.stats{display:grid;grid-template-columns:repeat(6,1fr);border-left:1px solid var(--line);border-top:1px solid var(--line);margin-top:50px}.stat{min-height:135px;padding:20px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}.stat span{color:#8f8493;font-size:.54rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em}.stat strong{display:block;margin-top:25px;font-family:"Archivo Black";font-size:2.5rem;line-height:.9;letter-spacing:-.06em}
.grid{display:grid;grid-template-columns:1fr .72fr;gap:16px;margin-top:48px}.panel{border:1px solid var(--line);background:rgba(255,255,255,.018)}.panel-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line)}.panel-head h2{margin:0;font-family:"Archivo Black";font-size:1.15rem;letter-spacing:-.04em;text-transform:uppercase}.panel-head span{color:#8d8291;font-size:.56rem;text-transform:uppercase}.info-grid{display:grid;grid-template-columns:repeat(2,1fr)}.info{padding:21px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}.info:nth-child(2n){border-right:0}.info span{color:#817686;font-size:.53rem;text-transform:uppercase}.info strong{display:block;margin-top:8px;font-size:.76rem}.note{padding:22px;color:#beb3c1;line-height:1.75;font-size:.74rem}.transfers{display:grid}.transfer{display:grid;grid-template-columns:1fr 35px 1fr auto;align-items:center;gap:13px;padding:17px 20px;border-bottom:1px solid var(--line)}.transfer:last-child{border-bottom:0}.transfer-club{display:flex;align-items:center;gap:9px}.transfer-logo{width:34px;height:34px;display:grid;place-items:center;overflow:hidden;border:1px solid var(--line);font-size:.45rem;font-weight:700}.transfer-logo img{width:100%;height:100%;object-fit:contain;padding:4px}.transfer-value{text-align:right;font-size:.63rem;font-weight:700}.transfer-value span{display:block;margin-top:5px;color:#776d7b;font-size:.51rem}.empty{padding:35px 20px;color:#8c818f;text-align:center;font-size:.68rem}.error{margin-top:40px;padding:60px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);color:#a99eac;text-align:center}
footer{padding:45px 0 30px;border-top:1px solid var(--line)}.footer-word{font-family:"Archivo Black";font-size:clamp(5rem,14vw,12rem);line-height:.72;letter-spacing:-.09em;color:rgba(255,255,255,.07)}
@media(max-width:1000px){.links{display:none}.hero{grid-template-columns:250px 1fr}.stats{grid-template-columns:repeat(3,1fr)}.grid{grid-template-columns:1fr}}@media(max-width:700px){.shell{width:calc(100% - 24px)}.actions .button:first-child{display:none}.hero{grid-template-columns:1fr;gap:25px}.portrait{width:190px}.rating{margin-left:0}.stats{grid-template-columns:1fr 1fr}.identity{align-items:flex-start}.transfer{grid-template-columns:1fr 25px 1fr}.transfer-value{grid-column:1/-1;text-align:left}}
</style>
</head>
<body>
<header id="header"><div class="shell nav"><a class="brand" href="index.html">YSL</a><nav class="links"><a href="index.html">Home</a><a href="fixtures.html">Fixtures</a><a href="standings.html">Standings</a><a href="playersheet.html">Players</a><a href="transfers.html">Transfers</a><a href="about.html">About</a></nav><div class="actions"><a class="button" href="login.html">Player login</a><a class="button" href="admin.html">Admin</a></div></div></header>
<main><div class="shell"><a class="back" href="playersheet.html">← Back to playersheet</a><div id="content"><div class="error">Loading player profile…</div></div></div></main>
<footer><div class="shell"><div class="footer-word">YSL</div></div></footer>
<script>
const $=id=>document.getElementById(id),esc=v=>String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"),initials=v=>String(v||"?").split(/\s+/).filter(Boolean).map(x=>x[0]).join("").slice(0,3).toUpperCase(),money=v=>new Intl.NumberFormat("en-GB",{style:"currency",currency:"GBP",maximumFractionDigits:0}).format(Number(v||0)),date=v=>v?new Intl.DateTimeFormat("en-GB",{day:"numeric",month:"short",year:"numeric"}).format(new Date(v)):"Date unknown";
addEventListener("scroll",()=>$("header").classList.toggle("scrolled",scrollY>20),{passive:true});
function img(url,name,cover=false){return url?`<img src="${esc(url)}" alt="${esc(name)}" style="object-fit:${cover?"cover":"contain"}" onerror="this.parentElement.textContent='${esc(initials(name))}'">`:esc(initials(name))}
function transferLogo(url,name){return `<div class="transfer-logo">${img(url,name)}</div>`}
async function fetchJsonProfile(url){
  const response=await fetch(url,{cache:"no-store",headers:{Accept:"application/json"}});
  const contentType=response.headers.get("content-type")||"";
  if(!contentType.includes("application/json")){
    const text=await response.text();
    throw new Error(response.status===404
      ?"Player profile API route was not found on the server."
      :"The server returned an HTML page instead of player data.");
  }
  const body=await response.json();
  if(!response.ok)throw new Error(body.error||`Request failed (${response.status})`);
  return body;
}

async function load(){
  const id=new URLSearchParams(location.search).get("id");
  if(!id){
    $("content").innerHTML=`<div class="error">No player was selected.</div>`;
    return;
  }

  const endpoints=[
    `/api/public/players/${encodeURIComponent(id)}`,
    `/api/players/${encodeURIComponent(id)}`
  ];

  let body=null;
  let lastError=null;

  for(const endpoint of endpoints){
    try{
      body=await fetchJsonProfile(endpoint);
      break;
    }catch(error){
      lastError=error;
    }
  }

  if(!body){
    $("content").innerHTML=`<div class="error">${esc(lastError?.message||"Could not load player.")}</div>`;
    return;
  }

  try{
    const p=body.player||body;
    const s=p.stats||{};
    const transfers=Array.isArray(p.transfers)?p.transfers:[];
    document.title=`${p.username} — YSL`;

    $("content").innerHTML=`<section class="hero"><div class="portrait">${img(p.avatarUrl,p.username,true)}</div><div><div class="eyebrow">${esc(body.season||"Current season")}</div><h1 class="name">${esc(p.username)}</h1><div class="identity"><div class="club"><div class="club-logo">${img(p.teamLogo,p.team)}</div><div class="club-copy"><strong>${esc(p.team)}</strong><span>Current club</span></div></div><span class="pill">${esc(p.position||"—")}</span><span class="pill">${esc(p.role)}</span><span class="pill">${esc(p.availability)}</span><div class="rating">${esc(p.rating)}<small>Rating</small></div></div></div></section><section class="stats"><article class="stat"><span>Appearances</span><strong>${esc(s.appearances||0)}</strong></article><article class="stat"><span>Goals</span><strong>${esc(s.goals||0)}</strong></article><article class="stat"><span>Assists</span><strong>${esc(s.assists||0)}</strong></article><article class="stat"><span>Contributions</span><strong>${esc(s.contributions||0)}</strong></article><article class="stat"><span>Player of match</span><strong>${esc(s.potm||0)}</strong></article><article class="stat"><span>Clean sheets</span><strong>${esc(s.cleanSheets||0)}</strong></article></section><section class="grid"><article class="panel"><div class="panel-head"><h2>Player information</h2><span>Public profile</span></div><div class="info-grid"><div class="info"><span>Roblox ID</span><strong>${esc(p.robloxId||"Not available")}</strong></div><div class="info"><span>Market value</span><strong>${money(p.value)}</strong></div><div class="info"><span>Starts</span><strong>${esc(s.starts||0)}</strong></div><div class="info"><span>Minutes played</span><strong>${esc(s.minutesPlayed||0)}</strong></div><div class="info"><span>Wins / Draws / Losses</span><strong>${esc(s.wins||0)} / ${esc(s.draws||0)} / ${esc(s.losses||0)}</strong></div><div class="info"><span>Cards</span><strong>${esc(s.yellowCards||0)} yellow · ${esc(s.redCards||0)} red</strong></div></div><div class="note">${esc(p.note||"No public player note has been added.")}</div></article><article class="panel"><div class="panel-head"><h2>Transfer history</h2><span>${transfers.length} moves</span></div><div class="transfers">${transfers.length?transfers.map(t=>`<div class="transfer"><div class="transfer-club">${transferLogo(t.fromTeamLogo,t.fromTeam)}<span>${esc(t.fromTeam)}</span></div><span>→</span><div class="transfer-club">${transferLogo(t.toTeamLogo,t.toTeam)}<span>${esc(t.toTeam)}</span></div><div class="transfer-value">${t.value?money(t.value):"Free"}<span>${date(t.date)}</span></div></div>`).join(""):`<div class="empty">No transfer history recorded.</div>`}</div></article></section>`;
  }catch(error){
    $("content").innerHTML=`<div class="error">${esc(error.message||"Could not display player profile.")}</div>`;
  }
}
load();
</script>
</body>
</html>
