<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0f0818">
<title>Fixtures — YSL</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0818;--surface:#171021;--surface2:#1d1429;--line:rgba(255,255,255,.09);--text:#f7f3fb;--muted:#a99cb5;--purple:#8f5cf6;--purple2:#6f3ee8;--success:#58d39b;--danger:#ff6f8f;--shadow:0 24px 70px rgba(0,0,0,.34)}
*{box-sizing:border-box}html{background:var(--bg);color-scheme:dark}body{margin:0;min-height:100vh;color:var(--text);background:radial-gradient(circle at 84% 14%,rgba(143,92,246,.09),transparent 28%),linear-gradient(180deg,#0f0818,#110a1a);font-family:Inter,sans-serif}a{color:inherit;text-decoration:none}button,input,select{font:inherit}
.site{min-height:100vh;display:grid;grid-template-rows:82px 1fr}.topbar{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:32px;padding:0 4vw;border-bottom:1px solid var(--line);background:rgba(15,8,24,.86);backdrop-filter:blur(18px)}.brand{display:flex;align-items:center;gap:13px}.brand-mark{font:800 2.2rem/1 Manrope;letter-spacing:-.09em}.brand-mark span{color:var(--purple)}.brand-line{width:1px;height:38px;background:rgba(255,255,255,.15)}.brand-copy{color:var(--muted);font-size:.62rem;font-weight:700;line-height:1.18;text-transform:uppercase}.nav{justify-self:center;display:flex;gap:28px}.nav a{position:relative;padding:31px 0 28px;color:#c9c0d2;font-size:.68rem;font-weight:700;text-transform:uppercase}.nav a:after{content:"";position:absolute;left:50%;right:50%;bottom:0;height:2px;background:var(--purple);transition:.2s}.nav a:hover,.nav a.active{color:#fff}.nav a:hover:after,.nav a.active:after{left:0;right:0}.header-actions{display:flex;gap:10px}.header-actions a{min-height:42px;display:inline-flex;align-items:center;padding:0 15px;border-radius:10px;font-size:.67rem;font-weight:800}.login{border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.03)}.dashboard{background:linear-gradient(135deg,var(--purple),var(--purple2))}
.page{padding:44px 4vw 56px}.shell{width:min(1480px,100%);margin:auto}.heading{display:flex;align-items:end;justify-content:space-between;gap:24px;margin-bottom:24px}.eyebrow{color:#cdbbff;font-size:.64rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase}.heading h1{margin:10px 0 0;font:800 clamp(3.6rem,6vw,6.7rem)/.92 Manrope;letter-spacing:-.075em}.heading p{max-width:620px;color:#c4bacd;line-height:1.7}.next{min-width:310px;padding:18px;border:1px solid var(--line);border-radius:18px;background:rgba(23,16,33,.9);box-shadow:var(--shadow)}.next span{color:var(--muted);font-size:.6rem;text-transform:uppercase}.next strong{display:block;margin-top:8px;font:800 1.15rem Manrope}.next small{display:block;margin-top:8px;color:#c8b7ff}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:16px;padding:14px;border:1px solid var(--line);border-radius:16px;background:rgba(23,16,33,.9)}.left,.right{display:flex;gap:9px;flex-wrap:wrap}.search{min-width:250px;height:42px;display:flex;align-items:center;gap:8px;padding:0 12px;border:1px solid var(--line);border-radius:11px;background:var(--surface2)}.search input{width:100%;border:0;outline:0;color:var(--text);background:transparent}.filter,select{min-height:42px;padding:0 13px;border:1px solid var(--line);border-radius:11px;color:#ddd3e4;background:var(--surface2);font-size:.67rem;font-weight:800}.filter{cursor:pointer}.filter.active{color:#fff;border-color:transparent;background:linear-gradient(135deg,var(--purple),var(--purple2))}
.list{display:grid;gap:16px}.group{display:grid;gap:10px}.group-head{display:flex;align-items:center;justify-content:space-between;padding:0 4px}.group-head h2{margin:0;font:800 1rem Manrope}.group-head span{color:var(--muted);font-size:.62rem}
.fixture{--comp:#8f5cf6;--comp2:#6f3ee8;--comp-soft:rgba(143,92,246,.12);position:relative;overflow:hidden;display:grid;grid-template-columns:150px minmax(0,1fr) 190px;align-items:center;gap:20px;min-height:130px;padding:18px 20px;border:1px solid color-mix(in srgb,var(--comp) 28%,var(--line));border-radius:18px;background:linear-gradient(105deg,color-mix(in srgb,var(--comp) 7%,var(--surface2)),var(--surface2) 38%);box-shadow:0 16px 44px rgba(0,0,0,.2);transition:.2s}.fixture:before{content:"";position:absolute;inset:0 auto 0 0;width:5px;background:linear-gradient(var(--comp),var(--comp2))}.fixture:after{content:"";position:absolute;width:230px;height:230px;right:-100px;top:-130px;border-radius:50%;background:color-mix(in srgb,var(--comp) 12%,transparent);pointer-events:none}.fixture:hover{transform:translateY(-3px);border-color:color-mix(in srgb,var(--comp) 58%,var(--line))}
.fixture.premier-league{--comp:#9b36ff;--comp2:#37003c;--comp-soft:rgba(155,54,255,.13)}.fixture.carabao-cup{--comp:#00c4b4;--comp2:#007b70;--comp-soft:rgba(0,196,180,.12)}.fixture.fa-cup{--comp:#ef3e42;--comp2:#8f111d;--comp-soft:rgba(239,62,66,.12)}.fixture.ucl{--comp:#5267ff;--comp2:#101d6d;--comp-soft:rgba(82,103,255,.14)}.fixture.world-cup{--comp:#d5a23f;--comp2:#7d1843;--comp-soft:rgba(213,162,63,.13)}.fixture.euros{--comp:#1f8fff;--comp2:#113f91;--comp-soft:rgba(31,143,255,.13)}
.comp-info{display:grid;gap:7px}.comp-badge{width:max-content;min-height:26px;display:inline-flex;align-items:center;gap:7px;padding:0 10px;border:1px solid color-mix(in srgb,var(--comp) 35%,transparent);border-radius:8px;color:color-mix(in srgb,var(--comp) 85%,white);background:var(--comp-soft);font-size:.56rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em}.comp-mark{width:7px;height:7px;border-radius:50%;background:var(--comp)}.time{font:800 1.05rem Manrope}.date{color:var(--muted);font-size:.61rem}
.matchup{position:relative;z-index:2;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px}.team{display:flex;align-items:center;gap:12px;min-width:0}.team.away{justify-content:flex-end;text-align:right}.logo{width:54px;height:54px;flex:0 0 54px;display:grid;place-items:center;overflow:hidden;border:1px solid color-mix(in srgb,var(--comp) 22%,var(--line));border-radius:15px;background:rgba(255,255,255,.04);font-size:.7rem;font-weight:800}.logo img{width:100%;height:100%;object-fit:contain;padding:5px}.team strong{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.8rem}.team small{display:block;margin-top:4px;color:var(--muted)}.score{min-width:84px;text-align:center}.score strong{display:block;font:800 1.4rem Manrope}.score span{display:block;margin-top:4px;color:var(--muted);font-size:.57rem}
.meta{position:relative;z-index:2;display:grid;gap:8px;justify-items:end;color:var(--muted);font-size:.61rem}.status{width:max-content;min-height:24px;display:inline-flex;align-items:center;padding:0 9px;border-radius:8px;font-size:.55rem;font-weight:800;text-transform:uppercase}.status.upcoming{color:color-mix(in srgb,var(--comp) 80%,white);background:var(--comp-soft)}.status.live{color:#fff;background:var(--danger)}.status.complete{color:var(--success);background:rgba(88,211,155,.1)}.empty{display:none;padding:60px;text-align:center;color:var(--muted)}.empty.show{display:block}
@media(max-width:1100px){.nav{gap:18px}.login{display:none}.fixture{grid-template-columns:130px 1fr}.meta{grid-column:1/-1;grid-auto-flow:column;justify-content:space-between;justify-items:start}}@media(max-width:850px){.topbar{grid-template-columns:1fr auto}.nav,.header-actions{display:none}.page{padding:32px 18px}.heading{align-items:start;flex-direction:column}.next{width:100%}.toolbar{align-items:stretch;flex-direction:column}.left{display:grid;grid-template-columns:1fr 1fr}.search{grid-column:1/-1;min-width:0}.fixture{grid-template-columns:1fr}.comp-info{grid-template-columns:auto 1fr auto;align-items:center}.matchup{gap:9px}.team{flex-direction:column;text-align:center}.team.away{flex-direction:column-reverse;text-align:center}.meta{grid-auto-flow:row;justify-content:start}}
</style>
</head>
<body>
<div class="site">
<header class="topbar"><a class="brand" href="index.html"><div class="brand-mark"><span>Y</span>SL</div><div class="brand-line"></div><div class="brand-copy" id="leagueBrand">Youth<br>Soccer League</div></a><nav class="nav"><a href="index.html">Home</a><a class="active" href="fixtures.html">Fixtures</a><a href="standings.html">Standings</a><a href="playersheet.html">Playersheet</a><a href="news.html">News</a><a href="about.html">About</a></nav><div class="header-actions"><a class="login" href="login.html" id="accountText">Player login</a><a class="dashboard" href="dashboard.html">Dashboard</a></div></header>
<main class="page"><div class="shell">
<section class="heading"><div><div class="eyebrow">Season One Match Centre</div><h1>Fixtures</h1><p>Each competition now has its own visual identity while keeping the page consistent and easy to scan.</p></div><article class="next"><span>Next fixture</span><strong id="nextTitle">Loading…</strong><small id="nextTime">Checking schedule</small></article></section>
<div class="toolbar"><div class="left"><label class="search"><span>⌕</span><input id="searchInput" type="search" placeholder="Search teams, venue or competition"></label><button class="filter active" data-filter="all">All</button><button class="filter" data-filter="upcoming">Upcoming</button><button class="filter" data-filter="complete">Results</button></div><div class="right"><select id="competitionSelect"><option value="all">All competitions</option><option>Premier League</option><option>Carabao Cup</option><option>FA Cup</option><option>UCL</option><option>World Cup</option><option>Euros</option></select><select id="sortSelect"><option value="date-asc">Soonest first</option><option value="date-desc">Latest first</option><option value="team">Team A–Z</option></select></div></div>
<div class="list" id="fixturesList"></div><div class="empty" id="emptyState">No fixtures match your filters.</div>
</div></main></div>
<script>
(()=>{const $=id=>document.getElementById(id);let site={settings:{websiteName:"YSL",leagueName:"Youth Soccer League"},theme:{mainPurple:"#8f5cf6",accentPurple:"#6f3ee8"},fixtures:[]},fixtures=[],activeFilter="all";
async function getJson(url){const r=await fetch(url,{cache:"no-store",headers:{Accept:"application/json"}});let b={};try{b=await r.json()}catch{}if(!r.ok)throw new Error(b.error||`Request failed (${r.status})`);return b}
async function load(){try{const d=await getJson("/api/site");site={settings:{...site.settings,...(d.settings||{})},theme:{...site.theme,...(d.theme||{})},fixtures:Array.isArray(d.fixtures)?d.fixtures:[]}}catch(e){console.error(e)}applyBranding();prepare();render();updateNext()}
function applyBranding(){$("leagueBrand").innerHTML=esc(site.settings.leagueName||"Youth Soccer League").replace(/\s+/g,"<br>");document.documentElement.style.setProperty("--purple",site.theme.mainPurple||"#8f5cf6");document.documentElement.style.setProperty("--purple2",site.theme.accentPurple||"#6f3ee8")}
function prepare(){fixtures=site.fixtures.map((f,i)=>{const hs=f.homeScore===""||f.homeScore==null?null:Number(f.homeScore),as=f.awayScore===""||f.awayScore==null?null:Number(f.awayScore);return{id:f.id||i+1,matchday:Number(f.matchday||1),competition:f.competition||"Premier League",date:f.date||"",time:f.time||"",home:f.home||"Home Team",away:f.away||"Away Team",homeLogo:f.homeLogo||"",awayLogo:f.awayLogo||"",venue:f.venue||"Venue TBC",status:String(f.status||(hs!=null&&as!=null?"complete":"upcoming")).toLowerCase(),homeScore:hs,awayScore:as,sortDate:dateValue(f)}})}
function visible(){const q=$("searchInput").value.trim().toLowerCase(),comp=$("competitionSelect").value;let list=fixtures.filter(f=>{const text=`${f.home} ${f.away} ${f.venue} ${f.competition}`.toLowerCase();if(q&&!text.includes(q))return false;if(comp!=="all"&&f.competition!==comp)return false;if(activeFilter==="upcoming"&&!["upcoming","live"].includes(f.status))return false;if(activeFilter==="complete"&&f.status!=="complete")return false;return true});const sorters={"date-asc":(a,b)=>a.sortDate-b.sortDate,"date-desc":(a,b)=>b.sortDate-a.sortDate,"team":(a,b)=>a.home.localeCompare(b.home)};return[...list].sort(sorters[$("sortSelect").value]||sorters["date-asc"])}
function render(){const list=visible();$("fixturesList").innerHTML="";$("emptyState").classList.toggle("show",!list.length);const groups=new Map();list.forEach(f=>{const key=f.competition;if(!groups.has(key))groups.set(key,[]);groups.get(key).push(f)});groups.forEach((matches,competition)=>{const section=document.createElement("section");section.className="group";section.innerHTML=`<div class="group-head"><h2>${esc(competition)}</h2><span>${matches.length} fixture${matches.length===1?"":"s"}</span></div>`;matches.forEach(f=>section.appendChild(card(f)));$("fixturesList").appendChild(section)})}
function card(f){const article=document.createElement("article");article.className=`fixture ${competitionClass(f.competition)}`;const score=["complete","live"].includes(f.status)?`${f.homeScore??0} – ${f.awayScore??0}`:"VS";article.innerHTML=`<div class="comp-info"><span class="comp-badge"><i class="comp-mark"></i>${esc(f.competition)}</span><strong class="time">${esc(f.time||"TBC")}</strong><span class="date">${formatDate(f.date)}</span></div><div class="matchup"><div class="team"><div class="logo">${logo(f.homeLogo,f.home)}</div><div><strong>${esc(f.home)}</strong><small>Home</small></div></div><div class="score"><strong>${score}</strong><span>${f.status==="complete"?"Full time":f.status==="live"?"Live now":"Scheduled"}</span></div><div class="team away"><div><strong>${esc(f.away)}</strong><small>Away</small></div><div class="logo">${logo(f.awayLogo,f.away)}</div></div></div><div class="meta"><span class="status ${esc(f.status)}">${statusText(f.status)}</span><span>⌖ ${esc(f.venue)}</span><span>Matchday ${f.matchday}</span></div>`;return article}
function competitionClass(value){return{"Premier League":"premier-league","Carabao Cup":"carabao-cup","FA Cup":"fa-cup","UCL":"ucl","World Cup":"world-cup","Euros":"euros"}[value]||"premier-league"}
function logo(url,name){return url?`<img src="${esc(url)}" alt="${esc(name)} logo" onerror="this.parentElement.textContent='${initials(name)}'">`:initials(name)}function initials(v){return String(v||"YS").split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0]).join("").toUpperCase()}function statusText(s){return s==="complete"?"Full time":s==="live"?"Live":"Upcoming"}function formatDate(v){const d=new Date(`${v}T00:00:00`);return Number.isNaN(d.getTime())?esc(v||"Date TBC"):d.toLocaleDateString([],{weekday:"short",day:"numeric",month:"short"})}function dateValue(f){const d=new Date(`${f.date||""}T${f.time||"00:00"}`);return Number.isNaN(d.getTime())?Number.MAX_SAFE_INTEGER:d.getTime()}function updateNext(){const n=fixtures.filter(f=>["upcoming","live"].includes(f.status)).sort((a,b)=>a.sortDate-b.sortDate)[0];$("nextTitle").textContent=n?`${n.home} vs ${n.away}`:"No upcoming fixture";$("nextTime").textContent=n?`${n.competition} • ${formatDate(n.date)} • ${n.time||"TBC"}`:"Schedule complete"}function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
$("searchInput").addEventListener("input",render);$("competitionSelect").addEventListener("change",render);$("sortSelect").addEventListener("change",render);document.querySelectorAll("[data-filter]").forEach(b=>b.addEventListener("click",()=>{activeFilter=b.dataset.filter;document.querySelectorAll("[data-filter]").forEach(x=>x.classList.toggle("active",x===b));render()}));load()})();
</script>
</body>
</html>
