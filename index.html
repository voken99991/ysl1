<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#ffffff">
<title>YSL Reimagined</title>
<meta name="description" content="Youth Soccer League — the start of your MPS journey.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<style>
.team-badge{overflow:hidden}.team-badge img{width:100%;height:100%;object-fit:contain;padding:4px}.team-badge.logo-empty{font-size:1.35rem}
</style>
</head>
<body>
<div class="page-shell">
<header class="topbar">
<a class="brand" href="index.html"><span class="brand-main" id="siteBrand">YSL</span><span class="brand-divider"></span><span class="brand-sub" id="leagueBrand">YOUTH<br>SOCCER<br>LEAGUE</span></a>
<nav class="nav-links"><a class="active" href="index.html">Home</a><a href="fixtures.html">Fixtures</a><a href="standings.html">Standings</a><a href="playersheet.html">Playersheet</a><a href="news.html">News</a><a href="about.html">About</a></nav>
<div class="nav-actions"><button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode"><span class="theme-icon-sun">☀</span><span class="theme-icon-moon">☾</span></button><a class="admin-link" href="admin.html">Admin Page</a><a class="dashboard-link" href="dashboard.html">Dashboard</a></div>
<button class="mobile-menu" id="mobileMenu" aria-label="Open menu" aria-expanded="false"><span></span><span></span></button>
</header>
<div class="mobile-nav" id="mobileNav"><a class="active" href="index.html">Home</a><a href="fixtures.html">Fixtures</a><a href="standings.html">Standings</a><a href="playersheet.html">Playersheet</a><a href="news.html">News</a><a href="about.html">About</a><a href="admin.html">Admin Page</a><a href="dashboard.html">Dashboard</a></div>

<main class="home">
<aside class="social-rail"><a href="#">◎</a><a href="#">◢</a><a href="#">▶</a><span class="social-line"></span></aside>
<section class="hero">
<div class="hero-copy">
<h1><span class="hero-ysl" id="heroTop">YSL</span><span class="hero-reimagined" id="heroBottom">REIMAGINED</span></h1>
<p id="heroDescription">The start of your MPS journey.</p>
<div class="hero-buttons">
<a class="primary-button" id="primaryButton" href="fixtures.html"><span id="primaryButtonText">View Fixtures</span><span>→</span></a>
<a class="secondary-button" id="secondaryButton" href="standings.html"><span id="secondaryButtonText">League Standings</span></a>
</div>
</div>
<div class="hero-art" aria-hidden="true"><div class="stripe stripe-1"></div><div class="stripe stripe-2"></div><div class="stripe stripe-3"></div><div class="line line-1"></div><div class="line line-2"></div></div>
</section>

<section class="fixtures-preview">
<div class="fixtures-heading"><span></span><h2>Upcoming Fixtures</h2><span></span></div>
<div class="fixture-grid" id="fixtureGrid"><article class="fixture-card"><div class="fixture-date">LOADING...</div></article></div>
</section>
</main>
</div>

<script src="assets/app.js"></script>
<script>
(()=>{
 const fallback={
  hero:{top:"YSL",bottom:"REIMAGINED",description:"The start of your MPS journey.",primaryText:"View Fixtures",primaryLink:"fixtures.html",secondaryText:"League Standings",secondaryLink:"standings.html"},
  fixtures:Array.from({length:3},()=>({date:"DATE",time:"TIME",home:"TEAM NAME",away:"TEAM NAME",venue:"VENUE NAME",homeLogo:"",awayLogo:""})),
  theme:{lightBg:"#ffffff",darkBg:"#14091f",mainPurple:"#43118d",accentPurple:"#8c45e9"},
  settings:{websiteName:"YSL",leagueName:"Youth Soccer League",discordInvite:""}
 };
 let current=fallback;

 async function load(){
  try{
   const response=await fetch("/api/site",{cache:"no-store",headers:{Accept:"application/json"}});
   const body=await response.json();
   if(!response.ok)throw new Error(body.error||`Failed to load (${response.status})`);
   current=merge(body);apply(current)
  }catch(error){console.error(error);apply(fallback)}
 }

 function merge(saved){
  const fixtures=Array.isArray(saved.fixtures)?saved.fixtures:[];
  while(fixtures.length<3)fixtures.push({});
  return{
   hero:{...fallback.hero,...(saved.hero||{})},
   fixtures:fixtures.slice(0,3).map((f,i)=>({...fallback.fixtures[i],...f})),
   theme:{...fallback.theme,...(saved.theme||{})},
   settings:{...fallback.settings,...(saved.settings||{})}
  }
 }

 function apply(data){
  heroTop.textContent=data.hero.top;heroBottom.textContent=data.hero.bottom;heroDescription.textContent=data.hero.description;
  primaryButtonText.textContent=data.hero.primaryText;primaryButton.href=data.hero.primaryLink||"fixtures.html";
  secondaryButtonText.textContent=data.hero.secondaryText;secondaryButton.href=data.hero.secondaryLink||"standings.html";
  siteBrand.textContent=data.settings.websiteName||"YSL";
  leagueBrand.innerHTML=(data.settings.leagueName||"Youth Soccer League").trim().split(/\s+/).map(escapeHtml).join("<br>");
  document.documentElement.style.setProperty("--purple",data.theme.mainPurple);
  document.documentElement.style.setProperty("--purple2",data.theme.accentPurple);
  document.documentElement.style.setProperty("--accent",data.theme.accentPurple);
  applyBg(data);render(data.fixtures);document.title=`${data.settings.websiteName||"YSL"} Reimagined`
 }

 function badge(url,name){
  if(!url)return `<div class="team-badge logo-empty" aria-label="${escapeHtml(name)}">◈</div>`;
  return `<div class="team-badge"><img src="${escapeHtml(url)}" alt="${escapeHtml(name)} logo" onerror="this.parentElement.classList.add('logo-empty');this.parentElement.innerHTML='◈'"></div>`
 }

 function render(fixtures){
  fixtureGrid.innerHTML="";
  fixtures.forEach(f=>{
   const card=document.createElement("article");card.className="fixture-card";
   card.innerHTML=`<div class="fixture-date">${escapeHtml(f.date)} &nbsp; | &nbsp; ${escapeHtml(f.time)}</div>
   <div class="fixture-teams">
    <div class="team-block">${badge(f.homeLogo,f.home)}<strong>${escapeHtml(f.home)}</strong></div>
    <div class="versus">VS</div>
    <div class="team-block">${badge(f.awayLogo,f.away)}<strong>${escapeHtml(f.away)}</strong></div>
   </div>
   <div class="venue">${escapeHtml(f.venue)}</div>`;
   fixtureGrid.appendChild(card)
  })
 }

 function applyBg(data){document.documentElement.style.setProperty("--bg",document.documentElement.dataset.theme==="dark"?data.theme.darkBg:data.theme.lightBg)}
 function escapeHtml(value){return String(value??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
 themeToggle?.addEventListener("click",()=>setTimeout(()=>applyBg(current),0));
 window.addEventListener("focus",load);
 document.addEventListener("visibilitychange",()=>{if(!document.hidden)load()});
 load()
})();
</script>
</body>
</html>
