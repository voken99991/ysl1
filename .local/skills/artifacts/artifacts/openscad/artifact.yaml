name: openscad
description: 'OpenSCAD model viewer'
kind: web

access:
  type: all_of
  conditions:
    - type: stack
      name: PNPM_WORKSPACE
    - type: flag
      name: gate_gimme_3d
      variation: 'true'

service_configs:
  - name: web
    development:
      run: pnpm --filter @workspace/__SLUG__ run dev
    production:
      serve: static
      build:
        - pnpm
        - --filter
        - '@workspace/__SLUG__'
        - run
        - build
      publicDir: artifacts/__SLUG__/dist/public
      rewrites:
        - from: '/*'
          to: /index.html

initial_open_files:
  - src/model.scad
  - src/App.tsx
  - src/index.css
  - scripts/render-scad.ts
  - package.json
  - vite.config.ts

additional_skills:
  - openscad
