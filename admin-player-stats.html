<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0e0716">


<main id="adminView" class="page hidden"><div class="shell">
<section class="heading"><div><div class="eyebrow">Website administration</div><h1>Player Statistics</h1></div><p>Select a player, edit their totals and save. Their public player dashboard will update straight away.</p></section>
<section class="layout">
<aside class="panel sidebar"><div class="search"><input id="search" class="field" placeholder="Search player or club…"></div><div id="playerList" class="player-list"></div></aside>
<section class="panel editor">
<div id="empty" class="empty">Select a player from the list to start editing.</div>
<form id="editorForm" class="hidden">
<div class="player-head"><div class="selected"><div id="selectedAvatar" class="avatar">YS</div><div><h2 id="selectedName">Player</h2><p id="selectedMeta">Team · Roblox ID</p></div></div><div id="saved" class="saved"></div></div>

<div class="section-title">Main profile</div>
<div class="grid">
<label><span>Rating</span><input class="field" id="rating" type="number" min="0" max="99"></label>
<label><span>Market value</span><input class="field" id="marketValue" type="number" min="0" step="1000"></label>
<label><span>Position</span><input class="field" id="position" maxlength="50" placeholder="GK, CB, CM, ST…"></label>
<label><span>Availability</span><select class="field" id="availability"><option>Available</option><option>Injured</option><option>Suspended</option><option>Unavailable</option></select></label>
</div>

<div class="section-title">Match statistics</div>
<div class="grid">
<label><span>Appearances</span><input class="field stat" id="appearances" type="number" min="0"></label>
<label><span>Starts</span><input class="field stat" id="starts" type="number" min="0"></label>
<label><span>Minutes played</span><input class="field stat" id="minutes_played" type="number" min="0"></label>
<label><span>Goals</span><input class="field stat" id="goals" type="number" min="0"></label>
<label><span>Assists</span><input class="field stat" id="assists" type="number" min="0"></label>
<label><span>Clean sheets</span><input class="field stat" id="clean_sheets" type="number" min="0"></label>
<label><span>Player of the match</span><input class="field stat" id="player_of_the_match" type="number" min="0"></label>
<label><span>Yellow cards</span><input class="field stat" id="yellow_cards" type="number" min="0"></label>
<label><span>Red cards</span><input class="field stat" id="red_cards" type="number" min="0"></label>
<label><span>Wins</span><input class="field stat" id="wins" type="number" min="0"></label>
<label><span>Draws</span><input class="field stat" id="draws" type="number" min="0"></label>
<label><span>Losses</span><input class="field stat" id="losses" type="number" min="0"></label>
</div>

<div class="section-title">Public player note</div>
<label><textarea class="field" id="note" maxlength="500" placeholder="Optional note shown on the player's dashboard…"></textarea></label>

<div class="actions"><span id="saveStatus" class="save-status"></span><button id="resetButton" class="secondary" type="button">Reset changes</button><button class="primary" type="submit">Save player stats</button></div>
</form>
</section>
</section>
</div></main>

<script>
const $=id=>document.getElementById(id),STAT_FIELDS=["appearances","starts","minutes_played","goals","assists","clean_sheets","player_of_the_match","yellow_cards","red_cards","wins","draws","losses"];let password="",players=[],selected=null;
const esc=v=>String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"),initials=v=>String(v||"YS").replace(/[^a-z0-9]/gi,"").slice(0,2).toUpperCase()||"YS";
async function api(url,options={}){const r=await fetch(url,{...options,headers:{"Content-Type":"application/json","X-Admin-Password":password,...(options.headers||{})}});let b={};try{b=await r.json()}catch{}if(!r.ok)throw new Error(b.error||`Request failed (${r.status})`);return b}
function avatar(url,name){return url?`<img src="${esc(url)}" alt="${esc(name)} avatar" onerror="this.parentElement.textContent='${esc(initials(name))}'">`:esc(initials(name))}
$("loginForm").addEventListener("submit",async e=>{e.preventDefault();password=$("password").value;try{await api("/api/admin/stats/login",{method:"POST"});sessionStorage.setItem("yslStatsAdminPassword",password);await openAdmin()}catch(err){$("loginMessage").textContent=err.message}})
async function openAdmin(){$("loginMessage").textContent="";const data=await api("/api/admin/stats/players");players=data.players||[];$("loginView").classList.add("hidden");$("adminView").classList.remove("hidden");renderList()}
function renderList(){const q=$("search").value.trim().toLowerCase(),filtered=players.filter(p=>!q||p.username.toLowerCase().includes(q)||String(p.team).toLowerCase().includes(q));$("playerList").innerHTML=filtered.length?filtered.map(p=>`<button class="player-row ${selected?.id===p.id?"active":""}" type="button" data-id="${esc(p.id)}"><span class="avatar">${avatar(p.avatarUrl,p.username)}</span><span class="player-copy"><strong>${esc(p.username)}</strong><span>${esc(p.team)} · ${p.active?"Active":"Inactive"}</span></span><span class="small-rating">${esc(p.rating)}</span></button>`).join(""):`<div class="empty">No players found.</div>`;$("playerList").querySelectorAll("[data-id]").forEach(b=>b.addEventListener("click",()=>selectPlayer(b.dataset.id)))}
function selectPlayer(id){selected=players.find(p=>String(p.id)===String(id));if(!selected)return;$("empty").classList.add("hidden");$("editorForm").classList.remove("hidden");$("selectedAvatar").innerHTML=avatar(selected.avatarUrl,selected.username);$("selectedName").textContent=selected.username;$("selectedMeta").textContent=`${selected.team} · Roblox ID ${selected.robloxId||"Not available"}`;$("rating").value=selected.rating;$("marketValue").value=selected.marketValue;$("position").value=selected.position==="Position not assigned"?"":selected.position;$("availability").value=selected.availability||"Available";$("note").value=selected.note||"";STAT_FIELDS.forEach(f=>$(f).value=selected.stats?.[f]??0);$("saved").textContent="";$("saveStatus").textContent="";renderList()}
$("search").addEventListener("input",renderList);$("resetButton").addEventListener("click",()=>selected&&selectPlayer(selected.id));
$("editorForm").addEventListener("submit",async e=>{e.preventDefault();if(!selected)return;const body={rating:Number($("rating").value||0),marketValue:Number($("marketValue").value||0),position:$("position").value,availability:$("availability").value,note:$("note").value};STAT_FIELDS.forEach(f=>body[f]=Number($(f).value||0));$("saveStatus").textContent="Saving…";try{await api(`/api/admin/stats/players/${encodeURIComponent(selected.id)}`,{method:"PUT",body:JSON.stringify(body)});selected={...selected,rating:body.rating,marketValue:body.marketValue,position:body.position||"Position not assigned",availability:body.availability,note:body.note,stats:Object.fromEntries(STAT_FIELDS.map(f=>[f,body[f]]))};players=players.map(p=>p.id===selected.id?selected:p);$("saveStatus").textContent="Saved successfully.";$("saved").textContent="Live on player profile";renderList()}catch(err){$("saveStatus").textContent=err.message}})
password=sessionStorage.getItem("yslStatsAdminPassword")||"";if(password)openAdmin().catch(()=>{password="";sessionStorage.removeItem("yslStatsAdminPassword")});
</script>
</body>
</html>
